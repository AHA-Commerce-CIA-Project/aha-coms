# Cloud Build pipeline for the COMS Portal Web service.
# Per integration contract §8 — monorepo-root context, image tag = git SHA,
# secrets sourced from Secret Manager (not substitutions).
#
# This file is the manual escape hatch for one-off deploys (`gcloud builds
# submit --config apps/portal-web/cloudbuild.yaml .`). The hot deploy path is
# `.github/workflows/deploy-portal-web.yml` (T17 returned deploys to GHA);
# this yaml mirrors that workflow's build-arg shape so the two paths produce
# byte-identical images.
#
# VITE_GIP_* are inlined into the portal-web SSR bundle at build time by Vite
# (see apps/portal-web/src/lib/firebase.ts + Dockerfile ARGs).
# - VITE_GIP_API_KEY: fetched from `coms-portal-gip-api-key` (the same secret
#   portal-api reads at runtime — single source of truth, not a duplicate
#   vite-prefixed copy).
# - VITE_GIP_AUTH_DOMAIN, VITE_GIP_PROJECT_ID: inline plain values. Firebase
#   web config is public by Firebase's own model and lives in the bundle that
#   ships to the browser; storing them as secrets would buy no protection.
#
# Trigger should set `includedFiles`:
#   - apps/portal-web/**
#   - apps/portal-api/**            (web type-checks against api types)
#   - packages/shared/**
#   - packages/sdk/**
#   - packages/ui-svelte/**
#   - packages/design-tokens/**
#   - packages/account-widget-svelte/**
#   - package.json
#   - bun.lock

# Cloud Build does NOT recursively expand `${...}` references that appear
# inside another substitution's value — only direct references in step
# args are expanded. So _IMAGE and _RUNTIME_SA are hard-inlined here
# rather than composed from `${PROJECT_ID}` + `${_SERVICE_NAME}`. If the
# project id ever moves, both literals here move with it; the GHA
# workflow holds the same values in `env:` and is the path of record.
substitutions:
  _REGION: asia-southeast2
  _SERVICE_NAME: coms-portal-web
  _IMAGE: asia-southeast2-docker.pkg.dev/fbi-dev-484410/coms-portal-registry/coms-portal-web
  _RUNTIME_SA: coms-portal-run-sa@fbi-dev-484410.iam.gserviceaccount.com
  _VITE_GIP_AUTH_DOMAIN: fbi-dev-484410.firebaseapp.com

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/coms-portal-gip-api-key/versions/latest
      env: VITE_GIP_API_KEY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    secretEnv: [VITE_GIP_API_KEY]
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --file=apps/portal-web/Dockerfile \
          --tag=${_IMAGE}:${COMMIT_SHA} \
          --tag=${_IMAGE}:latest \
          --cache-from=${_IMAGE}:latest \
          --build-arg=BUILDKIT_INLINE_CACHE=1 \
          --build-arg=VITE_GIP_API_KEY="$$VITE_GIP_API_KEY" \
          --build-arg=VITE_GIP_AUTH_DOMAIN="${_VITE_GIP_AUTH_DOMAIN}" \
          --build-arg=VITE_GIP_PROJECT_ID="${PROJECT_ID}" \
          .

  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args: [push, --all-tags, '${_IMAGE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA}
      - --quiet

images:
  - ${_IMAGE}:${COMMIT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  # Default (UNSPECIFIED) standard machine — 1 vCPU, 4 GB, first
  # 120 build-minutes/day free. The escape hatch is a rare-path
  # tool; the GHA workflow already deploys on ubuntu-latest under
  # GitHub's free-Actions quota for public repos. No need to pay
  # for E2_HIGHCPU_8 on a path that's exercised once a year.

timeout: 1500s
