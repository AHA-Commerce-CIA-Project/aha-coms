# Cloud Build pipeline for the COMS Portal Web service.
# Per integration contract §8 — monorepo-root context, image tag = git SHA,
# secrets sourced from Secret Manager (not substitutions).
#
# VITE_GIP_* build args are baked into the client bundle. They're stored in
# Secret Manager (`coms-portal-vite-gip-*`) and fetched via availableSecrets
# rather than passed as substitutions, per §8 's "never bake secrets into
# substitutions" rule even though Firebase web config is technically public.
#
# Trigger should set `includedFiles`:
#   - apps/portal-web/**
#   - apps/portal-api/**            (web type-checks against api types)
#   - packages/shared/**
#   - packages/sdk/**
#   - packages/ui-svelte/**
#   - packages/design-tokens/**
#   - packages/account-widget-svelte/**
#   - package.json
#   - bun.lock

substitutions:
  _REGION: asia-southeast2
  _SERVICE_NAME: coms-portal-web
  _ARTIFACT_REPO: coms-portal-registry
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}
  _RUNTIME_SA: coms-portal-run-sa@${PROJECT_ID}.iam.gserviceaccount.com

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/coms-portal-vite-gip-api-key/versions/latest
      env: VITE_GIP_API_KEY
    - versionName: projects/${PROJECT_ID}/secrets/coms-portal-vite-gip-auth-domain/versions/latest
      env: VITE_GIP_AUTH_DOMAIN
    - versionName: projects/${PROJECT_ID}/secrets/coms-portal-vite-gip-project-id/versions/latest
      env: VITE_GIP_PROJECT_ID

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    secretEnv: [VITE_GIP_API_KEY, VITE_GIP_AUTH_DOMAIN, VITE_GIP_PROJECT_ID]
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --file=apps/portal-web/Dockerfile \
          --tag=${_IMAGE}:${COMMIT_SHA} \
          --tag=${_IMAGE}:latest \
          --cache-from=${_IMAGE}:latest \
          --build-arg=BUILDKIT_INLINE_CACHE=1 \
          --build-arg=VITE_GIP_API_KEY="$$VITE_GIP_API_KEY" \
          --build-arg=VITE_GIP_AUTH_DOMAIN="$$VITE_GIP_AUTH_DOMAIN" \
          --build-arg=VITE_GIP_PROJECT_ID="$$VITE_GIP_PROJECT_ID" \
          .

  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args: [push, --all-tags, '${_IMAGE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA}
      - --quiet

images:
  - ${_IMAGE}:${COMMIT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1500s
