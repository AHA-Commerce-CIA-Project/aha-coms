# Cloud Build pipeline for the COMS Heroes API service.
# Per integration contract §8 — monorepo-root context, image tag = git SHA,
# secrets sourced from Secret Manager (not substitutions).
#
# Deploys to `coms-heroes-api`, declared in infra/heroes/cloud-run.tf
# alongside `coms-heroes-web` (T16.5 split the heroes infra to match the
# contract-aligned names). Runs as `coms-heroes-api-sa` — its own least-priv
# SA carrying DB access, GCS uploads, signed-URL minting, and the sheet-sync
# key. heroes-web has its own SA in the sibling cloudbuild.
#
# Trigger should set `includedFiles`:
#   - apps/heroes-api/**
#   - packages/heroes-shared/**
#   - packages/sdk/**
#   - packages/shared/**
#   - package.json
#   - bun.lock

substitutions:
  _REGION: asia-southeast2
  _SERVICE_NAME: coms-heroes-api
  _ARTIFACT_REPO: coms-portal-registry
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}
  _RUNTIME_SA: coms-heroes-api-sa@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=apps/heroes-api/Dockerfile
      - --tag=${_IMAGE}:${COMMIT_SHA}
      - --tag=${_IMAGE}:latest
      - --cache-from=${_IMAGE}:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args: [push, --all-tags, '${_IMAGE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA}
      - --quiet

images:
  - ${_IMAGE}:${COMMIT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1500s
