name: Deploy — portal-web

# Fires on push to main when portal-web or its dependencies change.
# ci.yml runs on PRs to main and gates merges via branch protection, so
# this workflow trusts the merged code passed typecheck/test there and
# skips re-running them.
#
# Repo vars expected:
#   WIF_PROVIDER_PORTAL  — full resource name of the portal WIF provider
#   WIF_SA_PORTAL        — coms-portal-github-actions@<project>.iam.gserviceaccount.com

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal-web/**'
      - 'apps/portal-api/**'   # web typechecks against api types
      - 'packages/shared/**'
      - 'packages/sdk/**'
      - 'packages/ui-svelte/**'
      - 'packages/design-tokens/**'
      - 'packages/account-widget-svelte/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-portal-web.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-portal-web
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: fbi-dev-484410
  GCP_REGION: asia-southeast2
  SERVICE_NAME: coms-portal-web
  ARTIFACT_REPO: coms-portal-registry
  RUNTIME_SA: coms-portal-run-sa@fbi-dev-484410.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PORTAL }}
          service_account: ${{ vars.WIF_SA_PORTAL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build, push, deploy
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}
        run: |
          # VITE_GIP_* are inlined into the portal-web SSR bundle at build time
          # by Vite (see apps/portal-web/src/lib/firebase.ts + Dockerfile ARGs).
          # The API key is the same value portal-api reads at runtime — fetch
          # it from the existing coms-portal-gip-api-key secret rather than
          # duplicating into a separate one. AUTH_DOMAIN + PROJECT_ID are
          # public Firebase web config (per Firebase's design); plain values.
          VITE_GIP_API_KEY=$(gcloud secrets versions access latest \
            --secret=coms-portal-gip-api-key \
            --project="${GCP_PROJECT_ID}")
          VITE_GIP_AUTH_DOMAIN=fbi-dev-484410.firebaseapp.com
          VITE_GIP_PROJECT_ID="${GCP_PROJECT_ID}"

          docker build \
            --file=apps/portal-web/Dockerfile \
            --tag="${IMAGE}:${GITHUB_SHA}" \
            --tag="${IMAGE}:latest" \
            --cache-from="${IMAGE}:latest" \
            --build-arg=BUILDKIT_INLINE_CACHE=1 \
            --build-arg="VITE_GIP_API_KEY=${VITE_GIP_API_KEY}" \
            --build-arg="VITE_GIP_AUTH_DOMAIN=${VITE_GIP_AUTH_DOMAIN}" \
            --build-arg="VITE_GIP_PROJECT_ID=${VITE_GIP_PROJECT_ID}" \
            .
          docker push --all-tags "${IMAGE}"
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}:${GITHUB_SHA}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --service-account="${RUNTIME_SA}" \
            --quiet
