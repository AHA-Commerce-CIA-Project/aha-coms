name: Deploy — fast

# Fires on push to main when fast or its dependencies change.
# ci.yml runs on PRs to main and gates merges via branch protection, so this
# workflow trusts the merged code passed typecheck/test there and skips
# re-running them.
#
# Fast runs as a single Next.js Cloud Run service (per ADR 0011 Open Question
# §3 Option A — API routes and pages share one runtime), so this workflow
# combines what heroes splits across deploy-heroes-api.yml + deploy-heroes-web.yml.
#
# DB schema lands BEFORE `gcloud run deploy`, mirroring portal-api (FU-3) and
# heroes-api (FU-5). Fast uses `prisma db push` rather than a migrations
# folder — push is the source-of-truth for additive schema changes. The
# destructive-migration caveat carries from heroes-api: a `DROP TABLE` shape
# (T64's drop of Session/Account/Verification is the canonical exception)
# needs the deploy-first-then-migrate ordering that this workflow's
# migrate-first-then-deploy default doesn't cover. Operator handles
# destructive Prisma migrations manually outside this workflow.
#
# Repo vars expected:
#   WIF_PROVIDER_FAST — full resource name of the fast WIF provider
#                       (projects/<num>/locations/global/workloadIdentityPools/coms-fast-wif-pool/providers/github-oidc)
#   WIF_SA_FAST       — coms-fast-deployer-sa@fbi-dev-484410.iam.gserviceaccount.com

on:
  push:
    branches: [main]
    paths:
      - 'apps/fast/**'
      - 'packages/ui-react/**'
      - 'packages/account-widget-react/**'
      - 'packages/design-tokens/**'
      - 'packages/sdk/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-fast.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-fast
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: fbi-dev-484410
  GCP_REGION: asia-southeast2
  SERVICE_NAME: coms-fast-web
  ARTIFACT_REPO: coms-fast-registry
  RUNTIME_SA: coms-fast-web-sa@fbi-dev-484410.iam.gserviceaccount.com
  # Fast's own Cloud SQL instance (per standing principle 1) — naming wart
  # `aha-fast-db-instance-*` recorded in plan.md as operationally costly to
  # rename in place. Cloud SQL doesn't support rename; this stays as-is.
  CLOUD_SQL_INSTANCE: fbi-dev-484410:asia-southeast2:aha-fast-db-instance-cd5db712
  CLOUD_SQL_PROXY_VERSION: v2.21.1
  DB_URL_SECRET: aha-fast-db-url

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_FAST }}
          service_account: ${{ vars.WIF_SA_FAST }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/fast/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve db-push skip token
        # Decide whether to skip the schema apply by inspecting ONLY the
        # subject line of the commit message — `[skip-db-push]` is an
        # opt-out the convention places at the end of the subject (e.g.
        # `Re-mark the corridor again [skip-db-push]`). The previous gate
        # used a whole-message `contains()` check, which tripped on the
        # token appearing anywhere in the body — including narrative prose
        # that explained why the token wasn't being used (see commit
        # e76bbd6, T77 + T78). Restricting the match to the first line
        # both honours the original opt-out convention and stops the body
        # from accidentally vetoing its own additive schema apply.
        id: dbpush
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          first_line=$(printf '%s' "$COMMIT_MSG" | head -n1)
          if printf '%s' "$first_line" | grep -q '\[skip-db-push\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Subject line contains [skip-db-push] — schema apply will be skipped"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Prisma schema (db push)
        # Schema lands before the revision that reads it. `prisma db push`
        # is non-destructive for additive shapes (column adds, table adds,
        # nullable widening). Destructive shapes (DROP TABLE/COLUMN, type
        # tightening that loses data) need the deploy-first-then-migrate
        # ordering that this step's migrate-first-then-deploy default does
        # NOT cover — for the T64 drop of Session/Account/Verification, the
        # new revision deploys first so the old code stops writing to the
        # tables before they disappear. If you find yourself authoring a
        # destructive schema change, stop and reach for an expand → backfill
        # → contract pattern, OR include `[skip-db-push]` at the end of the
        # commit's SUBJECT LINE (not anywhere else in the message) to bypass
        # this step and run the SQL manually via Cloud SQL Auth Proxy after
        # the new revision is serving.
        #
        # Fail fast: an additive push is seconds. Five minutes is a signal
        # something is stuck (Cloud SQL lock contention, proxy auth-flap,
        # runaway DEFAULT backfill on a huge table) — abort rather than burn
        # the runner.
        if: steps.dbpush.outputs.skip != 'true'
        timeout-minutes: 5
        run: |
          curl -sSLf -o cloud-sql-proxy \
            "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${CLOUD_SQL_PROXY_VERSION}/cloud-sql-proxy.linux.amd64"
          chmod +x cloud-sql-proxy

          ./cloud-sql-proxy --port 5433 "${CLOUD_SQL_INSTANCE}" &
          PROXY_PID=$!
          trap 'kill ${PROXY_PID} 2>/dev/null || true' EXIT

          # Wait up to 30s for the proxy to accept TCP.
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/5433) 2>/dev/null; then
              echo "cloud-sql-proxy ready after $((i * 500))ms"
              break
            fi
            if [ "${i}" -eq 60 ]; then
              echo "cloud-sql-proxy failed to become ready in 30s" >&2
              exit 1
            fi
            sleep 0.5
          done

          PROD_URL=$(gcloud secrets versions access latest \
            --secret="${DB_URL_SECRET}" \
            --project="${GCP_PROJECT_ID}")
          # Fast's stored DSN form: postgresql://user:pw@HOST:5432/db?schema=...
          # (public-IP form from the legacy aha-fast/terraform/main.tf). The
          # runner reaches Cloud SQL via the proxy on 127.0.0.1:5433, so we
          # rewrite the host:port segment. `?host=...` socket-DSN form is
          # not used today; the sed below handles the host:port shape only.
          PROXY_URL=$(echo "${PROD_URL}" | sed -E 's#@[^/@]+:[0-9]+/#@127.0.0.1:5433/#')

          DATABASE_URL="${PROXY_URL}" \
            bun --filter @coms-portal/fast db:push

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build, push, deploy
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}
        run: |
          docker build \
            --file=apps/fast/Dockerfile \
            --tag="${IMAGE}:${GITHUB_SHA}" \
            --tag="${IMAGE}:latest" \
            --cache-from="${IMAGE}:latest" \
            --build-arg=BUILDKIT_INLINE_CACHE=1 \
            .
          docker push --all-tags "${IMAGE}"
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}:${GITHUB_SHA}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --service-account="${RUNTIME_SA}" \
            --quiet
