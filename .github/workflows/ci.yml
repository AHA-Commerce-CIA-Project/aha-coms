name: CI — PR validation

# Runs on every PR to main: typecheck, unit tests, hardcoded-URL lint.
# Branch protection should require these to pass before merge so the
# deploy workflow on main can trust them.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/portal-api/node_modules
            apps/portal-web/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Prisma's postinstall is sandboxed under Bun, so the schema-typed
      # client (Prisma.InputJsonValue, the strongly-typed $queryRaw return
      # shapes, etc.) is not generated by `bun install` alone. Without this
      # step the @prisma/client namespace stays the empty stub and fast's
      # typecheck fails on every file that touches a Prisma type.
      - run: bun --filter @coms-portal/fast db:generate

      - run: bun run typecheck
      - run: bun run test

  lint-urls:
    name: Lint hardcoded URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for hardcoded portal URLs
        run: |
          # Match actual URL string literals only (quoted https://... ending in
          # .run.app or ahacommerce.net). We want to catch hardcoded fetches
          # that would break on the run.app → coms.ahacommerce.net cutover.
          #
          # Pathspec excludes carve out four classes of legitimate hits:
          #   - Config modules where these URLs are *the point* (portal-api +
          #     portal-web configs, the shared app-launcher constants, the
          #     heroes-api portal integration JSON).
          #   - Infrastructure-as-code (terraform .tf and .tfvars) — variable
          #     defaults and CORS origin literals are operator-facing config.
          #   - Documentation in any form (.md, /docs, /examples, .nelson) and
          #     operator task notes under /tasks — illustrative URLs, not fetches.
          #   - Test fixtures and the WEREWOLF easter-egg redirect in track/page.tsx
          #     (an intentional redirect to a sibling Cloud Run service that
          #     stays on its own run.app domain, unrelated to the COMS cutover).
          #
          # The trailing comment filter drops JSDoc and line-comment hits across
          # surviving files — comments illustrate the API shape, they do not
          # fetch. Patterns: /* /**  *  // # <!--
          ! git grep -nE '["'\'']https?://[^"'\''[:space:]]*(\.run\.app|ahacommerce\.net)' -- \
            ':!apps/portal-api/src/config.ts' \
            ':!apps/portal-web/src/lib/config.ts' \
            ':!packages/shared/src/constants/app-launcher.ts' \
            ':!apps/fast/app/track/page.tsx' \
            ':!apps/heroes-api/portal.integration.json' \
            ':!.env.example' \
            ':!**/__tests__/**' \
            ':!**/*.test.ts' \
            ':!**/*.test.svelte' \
            ':!.github/workflows/*' \
            ':!**/*.md' \
            ':!**/*.tf' \
            ':!**/*.tfvars' \
            ':!**/*.tfvars.example' \
            ':!**/examples/**' \
            ':!docs/**' \
            ':!.nelson/**' \
            ':!tasks/**' \
            | grep -vE '^[^:]+:[0-9]+:\s*(/\*\*?|\*[^/]|//|#|<!--)'
