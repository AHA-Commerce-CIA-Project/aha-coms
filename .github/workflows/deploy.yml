name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: fbi-dev-484410
  REGION: asia-southeast2
  REGISTRY: asia-southeast2-docker.pkg.dev
  IMAGE: asia-southeast2-docker.pkg.dev/fbi-dev-484410/coms-portal-registry/coms-portal
  SERVICE: coms-portal-app
  CLOUD_SQL_CONNECTION: fbi-dev-484410:asia-southeast2:coms-aha-heroes-db

jobs:
  deploy:
    name: Typecheck, Build, Migrate & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Typecheck ─────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate route tree
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      # ── Auth ──────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build & Push ──────────────────────────────────────────
      - name: Build and push image
        run: |
          docker build \
            --build-arg VITE_GIP_API_KEY=${{ secrets.VITE_GIP_API_KEY }} \
            --build-arg VITE_GIP_AUTH_DOMAIN=${{ secrets.VITE_GIP_AUTH_DOMAIN }} \
            --build-arg VITE_GIP_PROJECT_ID=${{ secrets.VITE_GIP_PROJECT_ID }} \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── DB Migration ──────────────────────────────────────────
      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Run database migration
        run: |
          ./cloud-sql-proxy ${{ env.CLOUD_SQL_CONNECTION }} --port 5432 &
          PROXY_PID=$!
          sleep 3

          DATABASE_URL="postgresql://coms_portal_app:${{ secrets.DB_PASSWORD }}@localhost:5432/coms_portal" \
            bunx drizzle-kit migrate

          kill $PROXY_PID

      # ── Deploy ────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
