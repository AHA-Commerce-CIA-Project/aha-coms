name: CD — Build, migrate, deploy

# Push to main:
#   test ─┐
#   infra ┼─→ migrate ─→ deploy
#   build ┘
#
# `test`, `infra`, and `build` run in parallel. `migrate` waits on `infra`
# (DB resources must exist) and `build` (runs the migration scripts inside
# the just-built image — no second `bun install` on the runner). `deploy`
# waits on `test` and `migrate`.
#
# Commit-message escape hatches:
#   [skip infra]  — skip only the OpenTofu job
#   [skip ci]     — skip everything (test, infra, build, migrate, deploy)
#   [docs-only]   — alias for [skip ci]

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_ID: fbi-dev-484410
  REGION: asia-southeast2
  REGISTRY: asia-southeast2-docker.pkg.dev
  IMAGE: asia-southeast2-docker.pkg.dev/fbi-dev-484410/coms-portal-registry/coms-portal
  SERVICE: coms-portal-app
  CLOUD_SQL_CONNECTION: fbi-dev-484410:asia-southeast2:coms-aha-heroes-db

jobs:
  test:
    name: Typecheck & unit tests
    if: >-
      ${{
        !contains(github.event.head_commit.message, '[skip ci]')
        && !contains(github.event.head_commit.message, '[docs-only]')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

  infra:
    name: Apply infra (OpenTofu)
    if: >-
      ${{
        !contains(github.event.head_commit.message, '[skip infra]')
        && !contains(github.event.head_commit.message, '[skip ci]')
        && !contains(github.event.head_commit.message, '[docs-only]')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.11.6
          tofu_wrapper: false

      - run: tofu fmt -check -recursive
      - run: tofu init -input=false -lockfile=readonly
      - run: tofu validate

      - name: tofu apply
        run: |
          tofu apply \
            -auto-approve \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -var="service_url=${{ vars.SERVICE_URL }}" \
            -var="bootstrap_admin_email=${{ vars.BOOTSTRAP_ADMIN_EMAIL }}" \
            -var="bootstrap_admin_name=${{ vars.BOOTSTRAP_ADMIN_NAME }}" \
            -var="mail_transport=${{ vars.MAIL_TRANSPORT || 'stdout' }}" \
            -var="brevo_from=${{ vars.BREVO_FROM }}"

  build:
    name: Build & push image
    if: >-
      ${{
        !contains(github.event.head_commit.message, '[skip ci]')
        && !contains(github.event.head_commit.message, '[docs-only]')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_GIP_API_KEY=${{ secrets.VITE_GIP_API_KEY }}
            VITE_GIP_AUTH_DOMAIN=${{ secrets.VITE_GIP_AUTH_DOMAIN }}
            VITE_GIP_PROJECT_ID=${{ secrets.VITE_GIP_PROJECT_ID }}
          cache-from: type=gha,scope=portal
          cache-to: type=gha,mode=max,scope=portal

  migrate:
    name: Migrate DB & bootstrap
    needs: [infra, build]
    if: >-
      ${{
        always()
        && needs.build.result == 'success'
        && (needs.infra.result == 'success' || needs.infra.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -sSLo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud-sql-proxy ${{ env.CLOUD_SQL_CONNECTION }} --port 5432 &
          echo "PROXY_PID=$!" >> "$GITHUB_ENV"
          # Wait for the proxy to bind instead of `sleep 3` — eliminates the
          # race where the migration starts before the socket is ready.
          for _ in $(seq 1 50); do
            if nc -z localhost 5432; then break; fi
            sleep 0.2
          done

      - name: Pull image
        run: docker pull ${{ env.IMAGE }}:${{ github.sha }}

      - name: Migrate, bootstrap signing key, seed admin
        env:
          DATABASE_URL: postgresql://coms_portal_app:${{ secrets.DB_PASSWORD }}@localhost:5432/coms_portal
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          BOOTSTRAP_ADMIN_EMAIL: ${{ vars.BOOTSTRAP_ADMIN_EMAIL }}
          BOOTSTRAP_ADMIN_NAME: ${{ vars.BOOTSTRAP_ADMIN_NAME }}
          BOOTSTRAP_ADMIN_PERSONAL_EMAIL: ${{ vars.BOOTSTRAP_ADMIN_PERSONAL_EMAIL }}
        run: |
          IMAGE="${{ env.IMAGE }}:${{ github.sha }}"
          # --network host lets the container reach the proxy on localhost:5432.
          # Linux-only; fine for ubuntu-latest runners.
          run_in_image() {
            docker run --rm --network host \
              -e DATABASE_URL \
              -e GCP_PROJECT_ID \
              -e BOOTSTRAP_ADMIN_EMAIL \
              -e BOOTSTRAP_ADMIN_NAME \
              -e BOOTSTRAP_ADMIN_PERSONAL_EMAIL \
              "$IMAGE" "$@"
          }

          run_in_image bun run --cwd apps/api db:migrate
          run_in_image bun run --cwd apps/api scripts/bootstrap-signing-key.ts
          run_in_image bun run --cwd apps/api db:seed-admin

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: kill "$PROXY_PID" 2>/dev/null || true

  deploy:
    name: Deploy to Cloud Run
    needs: [test, migrate]
    if: >-
      ${{
        always()
        && needs.test.result == 'success'
        && needs.migrate.result == 'success'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
