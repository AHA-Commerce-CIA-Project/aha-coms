name: CI — Infra plan (OpenTofu)

# Runs `tofu plan` on PRs that touch infra/**. Lets reviewers see the
# diff before it auto-applies on merge to main.

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-plan.yml'

concurrency:
  group: infra-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  plan:
    name: tofu plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.11.6
          tofu_wrapper: false

      - run: tofu fmt -check -recursive
      - run: tofu init -input=false -lockfile=readonly
      - run: tofu validate

      - name: tofu plan
        run: |
          tofu plan -no-color -input=false \
            -var="service_url=${{ vars.SERVICE_URL }}" \
            -var="bootstrap_admin_email=${{ vars.BOOTSTRAP_ADMIN_EMAIL }}" \
            -var="bootstrap_admin_name=${{ vars.BOOTSTRAP_ADMIN_NAME }}" \
            -var="mail_transport=${{ vars.MAIL_TRANSPORT || 'stdout' }}" \
            -var="brevo_from=${{ vars.BREVO_FROM }}"
